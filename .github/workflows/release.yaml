name: Release slaplib image

on:
  push:
    tags:
      - 'v*'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Derive version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify stdlib.yaml version matches tag
        uses: mikefarah/yq@5cf0adcc5b1f05537c68234dba216e9a0882a705 # master
        with:
          cmd: |
            yaml_version=$(yq '.metadata.version' stdlib.yaml)
            if [ "$yaml_version" != "${{ steps.version.outputs.version }}" ]; then
              echo "::error::stdlib.yaml version ($yaml_version) != tag (${{ steps.version.outputs.version }})"
              exit 1
            fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/slaplib:v${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/slaplib:latest
