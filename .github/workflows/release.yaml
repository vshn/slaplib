name: Release slaplib image

on:
  push:
    tags:
      - 'v*'

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Derive version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify stdlib.yaml version matches tag
        uses: mikefarah/yq@master
        with:
          cmd: |
            yaml_version=$(yq '.metadata.version' stdlib.yaml)
            if [ "$yaml_version" != "${{ steps.version.outputs.version }}" ]; then
              echo "::error::stdlib.yaml version ($yaml_version) != tag (${{ steps.version.outputs.version }})"
              exit 1
            fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/slaplib:v${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/slaplib:latest
